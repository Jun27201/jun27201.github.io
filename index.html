<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自己紹介サイト</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/pyscript.css" />
<script defer src="https://pyscript.net/releases/2023.11.1/pyscript.js"></script>
</head>
<body id="profile-game">

	<!-- ヘッダー -->
	<header>
    <nav class="nav">
        <ul>
            <li><a href="javascript:void(0)" onclick="toggleWorks()">成果物まとめ</a></li>
        </ul>
    </nav>
    <div class="status">
        <span id="floor-display">現在の階数: <span id="floor-count">0</span> / 8</span>
    </div>
	</header>


	<!-- ヘッダーここまで -->
<script>
	let currentFloor = 0;
	let hasAnomaly = false;
	let blackoutInterval = null;
	let glitchTimer = null;
	let activeRunawayEvent = null;
	let anomalyTimeouts = [];
	let appearedAnomalies = [];

const worksList = [
    {
        title: "ST GAME (Windows版)",
        description: "PythonとPygameで制作したシューティングゲーム。全10ステージ。",
        images: [
            "images/game-screenshot1.png",
            "images/game-screenshot2.png"
        ],
        downloadUrl: "https://github.com/Jun27201/St-game/releases/download/v1.0.0/stgame.zip",
        githubUrl: "https://github.com/Jun27201/St-game",
        type: "exe"
    },
    {
        title: "画像変換ツール (Windows版)",
        description: "選択したフォルダにある画像ファイルを任意のフォルダに.jpg形式で一括変換 名前も一括で連番になります。",
        images: [
            "images/画像変換ツール1.png",
            "images/画像変換ツール2.png",
            "images/画像変換ツール3.png"
        ],
        downloadUrl: "https://github.com/Jun27201/jpg-tool/releases/download/v1.0.0/imagetool.zip",
        githubUrl: "https://github.com/Jun27201/jpg-tool",
        type: "exe"
    },
    {
        title: "Wikipedia読み上げツール (Windows版)",
        description: "単語を入力して検索ボタンを押すとWikipediaの内容を読み上げてくれます。",
        images: [
            "images/wiki1.png",
            "images/wiki2.png"
        ],
        downloadUrl: "https://github.com/Jun27201/wikitool/releases/download/v1.0.0/syaberu.zip",
        githubUrl: "https://github.com/Jun27201/wikitool",
        type: "exe"
    },
];

let isWorksLoading = false;
let activeIntervals = {};

function toggleWorks() {
    const modal = document.getElementById('works-modal');
    const container = document.getElementById('works-container');

    if (!modal || !container) return;

    const isShowing = modal.classList.toggle('is-show');

    if (isShowing) {
        document.body.style.overflow = 'hidden';
        container.innerHTML = '';

        Object.values(activeIntervals).forEach(clearInterval);
        activeIntervals = {};

        worksList.forEach((work, workIndex) => {
            const card = document.createElement('div');
            card.className = 'work-card';

            const thumbTags = work.images.map((imgSrc, i) =>
                `<div class="thumb ${i === 0 ? 'active' : ''}" 
                      onclick="changeMainImage(${workIndex}, ${i})">
                    <img src="${imgSrc}" onerror="this.src='images/no-image.png'">
                 </div>`
            ).join('');

            card.innerHTML = `
                <div class="gallery-container">
                    <div class="main-display">
                        <img src="${work.images[0]}" 
                             id="current-img-${workIndex}" 
                             onclick="zoomImage(this.src)" 
                             style="cursor: zoom-in;">
                    </div>
                    <div class="thumb-nav">${thumbTags}</div>
                </div>
                <div class="work-info">
                    <h3>${work.title}</h3>
                    <p>${work.description}</p>
                    <div class="btn-group">
                        <a href="${work.downloadUrl}" class="btn-download" download>DOWNLOAD</a>
                        ${work.githubUrl ? `<a href="${work.githubUrl}" target="_blank" class="btn-github">SOURCE CODE</a>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(card);
            startAutoSlide(workIndex, work.images);
        });

        console.log(`%c[DEBUG] ギャラリーロード完了: ${worksList.length}作品`, "color: #3498db; font-weight: bold;");
    } else {
        Object.values(activeIntervals).forEach(clearInterval);
        activeIntervals = {};
        document.body.style.overflow = '';
        console.log("[SYSTEM] ギャラリータイマーを停止しました。");
    }
}

function zoomImage(imgSrc) {
    const overlay = document.getElementById('image-overlay');
    const overlayImg = document.getElementById('overlay-img');

    if (!overlay || !overlayImg) return;

    overlayImg.src = imgSrc;
    overlay.classList.add('is-show');

    console.log(`%c[DEBUG] 画像拡大: ${imgSrc}`, "color: #9b59b6; font-weight: bold;");
}

function closeImage() {
    const overlay = document.getElementById('image-overlay');
    overlay.classList.remove('is-show');
}

function changeMainImage(workIndex, imgIndex) {
    const mainImg = document.getElementById(`current-img-${workIndex}`);
    if (!mainImg) return;

    const card = mainImg.closest('.work-card');
    const thumbs = card.querySelectorAll('.thumb');
    const work = worksList[workIndex];

    mainImg.style.opacity = '0';

    setTimeout(() => {
        mainImg.src = work.images[imgIndex];
        mainImg.style.opacity = '1';
    }, 250);

    thumbs.forEach(t => t.classList.remove('active'));
    thumbs[imgIndex].classList.add('active');

    console.log(`%c[DEBUG] Work[${workIndex}] 切り替え: ${imgIndex + 1}枚目`, "color: #2ecc71;");

    if (activeIntervals[workIndex]) {
        clearInterval(activeIntervals[workIndex]);
        startAutoSlide(workIndex, work.images, imgIndex);
    }
}

function startAutoSlide(workIndex, images, startIndex = 0) {
    if (!images || images.length <= 1) return;

    let currentIndex = startIndex;
    activeIntervals[workIndex] = setInterval(() => {
        currentIndex = (currentIndex + 1) % images.length;
        changeMainImage(workIndex, currentIndex);
    }, 5000);
}

const defaultProfile = {
    birthday: "3月29日",
    from: "兵庫県",
    hobby: "一人旅、ライブ鑑賞"
};

const anomalySettings = {
    'anomaly-flip': {
        action: (card) => card.classList.add('anomaly-flip')
    },
    'anomaly-red': {
        action: (card) => {
            anomalyTimeouts.push(setTimeout(() => {
                if (hasAnomaly) {
                    document.body.classList.add('anomaly-red');
                }
            }, 5000));
        }
    },
    'anomaly-text': {
        action: (card, els) => {
            anomalyTimeouts.push(setTimeout(() => {
                if (hasAnomaly) els.birthday.innerText = "だれか います";
            }, 3000));

            anomalyTimeouts.push(setTimeout(() => {
                if (hasAnomaly) els.from.innerText = "うしろに";
            }, 6000));

            anomalyTimeouts.push(setTimeout(() => {
                if (hasAnomaly) els.hobby.innerText = "にげて にげて".repeat(10);
            }, 9000));

            if (currentFloor >= 3 && els.skill) {
                anomalyTimeouts.push(setTimeout(() => {
                    if (hasAnomaly) {
                        els.skill.innerText = "ずっと、見ているよ";
                        els.skill.style.color = "red";
                    }
                }, 11800));
            }
            card.classList.add('anomaly-text');
        }
    },
    'anomaly-text-big': {
        action: (card) => card.classList.add('anomaly-text-big')
    },
    'anomaly-sns': {
        action: (card) => {
            const snsIcon = document.querySelector('#sns img');
            const snsLink = document.querySelector('#sns a');
            if (snsIcon) {
                snsIcon.src = "images/instagram-logo.avif";
            }
            if (snsLink) {
                snsLink.href = "";
            }
            card.classList.add('anomaly-sns');
        }
    },
    'anomaly-birthday': {
        action: (card, els) => {
            els.birthday.innerText = "6月66日";
        }
    },
    'anomaly-glitch-floor': {
        action: () => {
            const floorEl = document.getElementById('floor-count');
            if (floorEl) {
                if (glitchTimer) clearInterval(glitchTimer);

                glitchTimer = setInterval(() => {
                    if (!hasAnomaly) {
                        clearInterval(glitchTimer);
                        glitchTimer = null;
                        return;
                    }
                    floorEl.innerText = getZalgoText(5);
                }, 3000);
            }
        }
    },
    'anomaly-eye-trace': {
        action: (card) => {
            card.classList.add('anomaly-eye-trace');
            window.addEventListener('mousemove', traceMouse);
        }
    },
    'anomaly-fall': {
        action: (card, els) => {
            const target = els.hobby;
            const text = target.innerText;
            target.innerHTML = '';

            const spans = text.split('').map(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = 'falling-char';
                target.appendChild(span);
                return span;
            });

            setTimeout(() => {
                if (!hasAnomaly) return;

                spans.forEach((span, index) => {
                    setTimeout(() => {
                        if (hasAnomaly) span.classList.add('is-falling');
                    }, index * 50);
                });
            }, 3000);
        }
    },
    'anomaly-runaway': {
        action: (card) => {
            const btnNormal = document.getElementById('btn-normal');
            if (!btnNormal) return;

            const runawaySuperFast = (e) => {
                if (!hasAnomaly) return;

                const rect = btnNormal.getBoundingClientRect();
                const btnCenterX = rect.left + rect.width / 2;
                const btnCenterY = rect.top + rect.height / 2;

                const distance = Math.hypot(e.clientX - btnCenterX, e.clientY - btnCenterY);

                if (distance < 150) {
                    const offsetX = (Math.random() - 0.5) * 600;
                    const offsetY = (Math.random() - 0.5) * 400;

                    btnNormal.style.position = 'relative';
                    btnNormal.style.transition = 'all 0.05s cubic-bezier(0.19, 1, 0.22, 1)';
                    btnNormal.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

                    console.log("%c[SPEED] 俊敏回避！", "color: #ff0000; font-weight: bold;");
                }
            };

            window.addEventListener('mousemove', runawaySuperFast);
            activeRunawayEvent = runawaySuperFast;
        }
    },
    'anomaly-ghost': {
        action: (card) => {
            const mainImg = document.querySelector('.left-content .images img');
            if (mainImg) {
                mainImg.style.transition = 'filter 3s ease-in-out';
                anomalyTimeouts.push(setTimeout(() => {
                    if (hasAnomaly) mainImg.style.filter = 'brightness(0)';
                }, 3000));
            }
        }
    },
};

// ========================================
// ★ ここが修正の核心部分：updateFloor は単独の関数として定義
// ========================================
function updateFloor() {
    const card = document.getElementById('profile-game');
    const overlay = document.getElementById('blackout-overlay');
    const snsIcon = document.querySelector('#sns img');
    const snsLink = document.querySelector('#sns a');
    const mainImg = document.querySelector('.left-content .images img');
    const floorEl = document.getElementById('floor-count');
    const skillRow = document.getElementById('special-skill-row');
    const skillText = document.getElementById('special-skill');
    const btnAnomaly = document.getElementById('btn-anomaly');
    const btnNormal = document.getElementById('btn-normal');
    const btnRestart = document.getElementById('btn-restart');
    const adArea = document.getElementById('anomaly-ad');
    const adLink = adArea ? adArea.querySelector('a') : null;

    const elements = {
        birthday: document.getElementById('birthday'),
        from: document.getElementById('from'),
        hobby: document.getElementById('hobby'),
        skill: document.getElementById('special-skill')
    };

    if (adArea) {
        adArea.style.display = 'block';
        adArea.style.border = '3px solid #333';
        adArea.style.boxShadow = '0 0 10px rgba(0,0,0,0.2)';
        adArea.classList.remove('ad-shake');

        if (adLink) {
            adLink.href = "javascript:void(0)";
            adLink.style.cursor = "default";
        }
    }

    card.className = '';
    if (floorEl) floorEl.innerText = currentFloor;

    elements.birthday.innerText = defaultProfile.birthday;
    elements.from.innerText = defaultProfile.from;
    elements.hobby.innerText = defaultProfile.hobby;

    if (skillText) {
        skillText.innerText = "早起き、情報収集";
        skillText.style.color = "";
    }

    document.body.classList.remove('anomaly-red');

    if (skillRow && currentFloor < 3) {
        skillRow.style.display = "none";
    }

    if (mainImg) {
        mainImg.style.filter = '';
        mainImg.style.transition = '';
        mainImg.style.opacity = '1';
    }

    if (btnNormal) {
        btnNormal.style.position = '';
        btnNormal.style.transform = '';
        btnNormal.style.transition = '';
        if (activeRunawayEvent) {
            window.removeEventListener('mousemove', activeRunawayEvent);
            activeRunawayEvent = null;
        }
    }

    if (snsIcon) snsIcon.src = "images/X.jpg";
    if (snsLink) {
        snsLink.href = "";
        snsLink.onclick = null;
    }
    if (mainImg) {
        mainImg.style.transform = "none";
    }

    if (overlay) {
        overlay.style.display = 'none';
        overlay.innerText = '';
    }

    if (blackoutInterval) {
        clearInterval(blackoutInterval);
        blackoutInterval = null;
    }
    if (glitchTimer) {
        clearInterval(glitchTimer);
        glitchTimer = null;
    }
    anomalyTimeouts.forEach(timeout => clearTimeout(timeout));
    anomalyTimeouts = [];
    window.removeEventListener('mousemove', traceMouse);

    if (currentFloor >= 9) {
        if (btnAnomaly) btnAnomaly.style.display = 'none';
        if (btnNormal)  btnNormal.style.display = 'none';
        if (btnRestart) btnRestart.style.display = 'inline-block';
        if (floorEl) floorEl.innerText = "8";
        if (skillRow) skillRow.style.display = "";
        renderFullProfile();
        hasAnomaly = false;
        return;
    }

    if (btnRestart) btnRestart.style.display = 'none';
    if (btnNormal)  btnNormal.style.display = 'inline-block';
    if (btnAnomaly) {
        btnAnomaly.style.display = (currentFloor === 0) ? 'none' : 'inline-block';
    }

    if (floorEl) floorEl.innerText = currentFloor;

    if (currentFloor === 0) {
        hasAnomaly = false;
        if (skillRow) skillRow.style.display = "none";
        return;
    }

    if (currentFloor >= 3) {
        if (skillRow && skillRow.style.display === "none") {
            alert("【新着情報】特技の項目が新しく追加されました！");
            skillRow.style.display = "";
        }
    }

    hasAnomaly = Math.random() > 0.5;

    if (hasAnomaly) {
        if (adArea) {
            adArea.style.border = '3px solid #333'; 
            adArea.style.boxShadow = '0 0 10px rgba(0,0,0,0.2)';

            if (adLink) {
                adLink.href = "https://jun27201.github.io/famazon/";
                adLink.style.cursor = "pointer";
            }
        }

        const allKeys = Object.keys(anomalySettings).filter(key => key !== 'anomaly-ad');
        const availableAnomalies = allKeys.filter(key => !appearedAnomalies.includes(key));

        let targetKey = "";
        if (availableAnomalies.length > 0) {
            targetKey = availableAnomalies[Math.floor(Math.random() * availableAnomalies.length)];
            appearedAnomalies.push(targetKey);
        } else {
            appearedAnomalies = [];
            targetKey = allKeys[Math.floor(Math.random() * allKeys.length)];
        }

        if (targetKey && anomalySettings[targetKey]) {
            anomalySettings[targetKey].action(card, elements);
            console.log("異変発生中: " + targetKey + " (＋ 広告表示)");
        }

        blackoutInterval = setInterval(() => {
            if (hasAnomaly) {
                if (Math.random() < 0.005) {
                    clearInterval(blackoutInterval);
                    triggerBlackout();
                }
            }
        }, 60000);

    } else {
        console.log("異変なし");
        if (adArea) {
            adArea.style.display = 'block';
        }
    }
} 



function getZalgoText(length) {
    const chars = "迴ｾ蝨ｨ縺ｮ髫主ｱ､ 縺薙％縺ｯ縺ｩ縺薙??縺ｯ繧?￥縺溘縺代※縲?";
    let result = "";
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

function traceMouse(e) {
    const img = document.querySelector('.left-content .images img');
    if (!img) return;

    const rect = img.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const angleX = (e.clientY - centerY) / 20;
    const angleY = (e.clientX - centerX) / 20;

    img.style.transform = `perspective(500px) rotateX(${-angleX}deg) rotateY(${angleY}deg) scale(1.1)`;
}

function handleAction(userChoseAnomaly) {
    if (blackoutInterval) {
        clearInterval(blackoutInterval);
        blackoutInterval = null;
    }

    if (userChoseAnomaly === hasAnomaly) {
        currentFloor++;
    } else {
        currentFloor = 0;
        appearedAnomalies = [];
        alert("不正解です。最初からやり直しです。");
    }

    const floorEl = document.getElementById('floor-count');
    if (floorEl) {
        floorEl.innerText = currentFloor > 8 ? 8 : currentFloor;
    }

    updateFloor();

    if (currentFloor >= 9) {
        alert("脱出成功！プロフィールが完成しました！");
    }
}

function triggerBlackout() {
    const overlay = document.getElementById('blackout-overlay');
    if (overlay) {
        overlay.style.display = 'block';
        overlay.innerText = "すぐに消せ".repeat(3000);

        setTimeout(() => {
            currentFloor = 0;
            updateFloor();
        }, 3000);
    }
}

function resetGame() {
    currentFloor = 0;
    appearedAnomalies = [];

    const floorDisplay = document.getElementById('floor-display');
    if (floorDisplay) {
        floorDisplay.innerHTML = '現在の階数: <span id="floor-count">0</span> / 8';
    }

    updateFloor();
    console.log("%c[SYSTEM] ゲームをリセットしました。", "color: #f1c40f;");
}

function renderFullProfile() {
    const skillRow = document.getElementById('special-skill-row');
    const skillText = document.getElementById('special-skill');
    const floorDisplay = document.getElementById('floor-display');

    if (skillRow) skillRow.style.display = "";
    if (skillText) {
        skillText.innerText = "早起き、情報収集";
        skillText.style.color = "";
    }

    if (floorDisplay) {
        floorDisplay.innerText = "現在の階数: CLEARED";
    }

    console.log("%c[DEBUG] 全ての異変を停止し、完成版プロフィールを表示しました。", "color: #2ecc71;");
}

// ページ読み込み時に最初のフロアをセット
window.onload = function() {
    updateFloor();
};

// コンソールで debugAnomaly('anomaly-runaway') と打つと即座に発動します
window.debugAnomaly = function(key) {
    hasAnomaly = true;
    const card = document.getElementById('profile-game');
    const elements = {
        birthday: document.getElementById('birthday'),
        from: document.getElementById('from'),
        hobby: document.getElementById('hobby'),
        skill: document.getElementById('special-skill')
    };
    anomalySettings[key].action(card, elements);
    console.log(`[DEBUG] 異変を強制発動: ${key}`);
};

document.addEventListener('DOMContentLoaded', () => {
    const backToTopBtn = document.getElementById('back-to-top');

    const handleScroll = () => {
        const mainScroll = window.scrollY;
        const modalEl = document.querySelector('.modal-content');
        const modalScroll = modalEl ? modalEl.scrollTop : 0;

        console.log(`Main: ${mainScroll}, Modal: ${modalScroll}`);

        if (mainScroll > 100 || modalScroll > 100) {
            backToTopBtn.style.display = 'flex';
            backToTopBtn.style.setProperty('display', 'flex', 'important');
        } else {
            backToTopBtn.style.display = 'none';
        }
    };

    window.addEventListener('scroll', handleScroll);

    document.addEventListener('scroll', (e) => {
        if (e.target.classList && e.target.classList.contains('modal-content')) {
            handleScroll();
        }
    }, true);

    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        const modalEl = document.querySelector('.modal-content');
        if (modalEl) modalEl.scrollTo({ top: 0, behavior: 'smooth' });
    });
});

	
</script>

<div id="anomaly-ad" style="display:block; position:fixed; bottom:20px; right:20px; width:200px; border:3px solid #333; background:#000; z-index:10000;">
    <a href="#" target="_blank" style="text-decoration:none; color:white;">
